<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#22C55E"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.1)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- 装饰圆 -->
  <circle cx="100" cy="100" r="300" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1100" cy="530" r="250" fill="rgba(255,255,255,0.05)"/>

  <!-- 主标题 -->
  <text x="600" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="white">AIDevHub</text>
  <text x="600" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="500" fill="rgba(255,255,255,0.9)">开发者工具排行榜 2026</text>

  <!-- 副标题 -->
  <text x="600" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="rgba(255,255,255,0.7)">AI编程工具 · 大模型 · 编程语言 · 数据库 · GitHub AI开源项目</text>

  <!-- 功能卡片 -->
  <g transform="translate(150, 400)">
    <rect width="180" height="120" rx="12" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <text x="90" y="45" text-anchor="middle" font-family="system-ui" font-size="28" fill="white">40+</text>
    <text x="90" y="75" text-anchor="middle" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.8)">收录工具</text>
  </g>

  <g transform="translate(360, 400)">
    <rect width="180" height="120" rx="12" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <text x="90" y="45" text-anchor="middle" font-family="system-ui" font-size="28" fill="white">5</text>
    <text x="90" y="75" text-anchor="middle" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.8)">排行分类</text>
  </g>

  <g transform="translate(570, 400)">
    <rect width="180" height="120" rx="12" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <text x="90" y="45" text-anchor="middle" font-family="system-ui" font-size="28" fill="white">40</text>
    <text x="90" y="75" text-anchor="middle" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.8)">GitHub AI项目</text>
  </g>

  <g transform="translate(780, 400)">
    <rect width="180" height="120" rx="12" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <text x="90" y="45" text-anchor="middle" font-family="system-ui" font-size="28" fill="white">中/英</text>
    <text x="90" y="75" text-anchor="middle" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.8)">双语支持</text>
  </g>

  <!-- 底部域名 -->
  <text x="600" y="580" text-anchor="middle" font-family="system-ui" font-size="20" fill="rgba(255,255,255,0.6)">virexstar.com</text>
</svg>